name: Build and Deploy to Server

# 环境变量：将在所有job中生效
env:
  REGISTRY_URL: ${{ secrets.REGISTRY_URL }}
  COMMIT_SHA: ${{ github.sha }}

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      # 你的原有构建与推送步骤保持不变
      - name: Checkout code
        uses: actions/checkout@v6
      # ... (docker/login-action, docker/build-push-action 等步骤)
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY_URL }}/message-send:${{ env.COMMIT_SHA }}
      # 你也可以同时打一个 latest 标签并推送，方便回滚
      - name: Tag and push 'latest' image
        run: |
          docker tag ${{ env.REGISTRY_URL }}/message-send:${{ env.COMMIT_SHA }} ${{ env.REGISTRY_URL }}/message-send:latest
          docker push ${{ env.REGISTRY_URL }}/message-send:latest

  deploy:
    needs: build-and-push  # 等待build任务成功完成后再执行
    runs-on: ubuntu-latest
    steps:
      # 1. 配置 SSH
      - name: Set up SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      # 2. 部署到服务器
      - name: Deploy to VPS
        run: |
          ssh -o StrictHostKeyChecking=no -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            cd /opt/message-send || exit 1
            export REGISTRY_URL=${{ env.REGISTRY_URL }}
            export COMMIT_SHA=${{ env.COMMIT_SHA }}
            docker compose pull
            docker compose up -d
          EOF