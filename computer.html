<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电脑接收端 - 扫码传文本</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif; }
        body {
            background: linear-gradient(145deg, #f5f7fc 0%, #e9eef4 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            max-width: 1000px;
            width: 100%;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(2px);
            border-radius: 48px;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.25);
            padding: 30px;
        }
        h1 {
            font-size: 2rem;
            font-weight: 600;
            background: linear-gradient(135deg, #1a2a3a, #0f2b3d);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            border-bottom: 2px solid rgba(0,0,0,0.08);
            padding-bottom: 20px;
            margin-bottom: 25px;
        }
        .status-badge {
            background: #1e2f3f;
            color: white;
            font-size: 0.8rem;
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: normal;
        }
        .two-columns {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
        }
        .qr-box {
            flex: 1;
            background: white;
            border-radius: 32px;
            padding: 24px 20px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }
        .qr-box h3 { margin-bottom: 18px; color: #1e2f3f; }
        #qrcode { display: flex; justify-content: center; margin: 10px auto; }
        .tip {
            margin-top: 20px;
            background: #eef2f9;
            display: inline-block;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.85rem;
        }
        .messages-box {
            flex: 2;
            background: white;
            border-radius: 32px;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }
        .messages-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            align-items: center;
        }
        .clear-btn {
            background: #edf2f7;
            border: none;
            padding: 6px 18px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 500;
        }
        .clear-btn:hover { background: #dde4ed; }

        /* 聊天列表 */
        .chat-list {
            background: #f0f2f5;
            border-radius: 24px;
            min-height: 300px;
            max-height: 380px;
            overflow-y: auto;
            padding: 16px 12px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .empty-msg { text-align: center; color: #a0b3c9; padding: 50px 20px; }

        /* 聊天行 */
        .chat-row {
            display: flex;
            flex-direction: column;
            max-width: 80%;
            animation: fadeIn 0.2s ease;
        }
        .chat-row.received { align-self: flex-start; align-items: flex-start; }
        .chat-row.sent { align-self: flex-end; align-items: flex-end; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .chat-sender {
            font-size: 0.65rem;
            color: #8a9bb0;
            margin-bottom: 2px;
            padding: 0 8px;
        }

        /* 聊天气泡 */
        .chat-bubble {
            padding: 10px 14px;
            border-radius: 18px;
            word-break: break-word;
            overflow-wrap: anywhere;
            font-size: 0.9rem;
            line-height: 1.5;
            position: relative;
            box-shadow: 0 1px 2px rgba(0,0,0,0.06);
            writing-mode: horizontal-tb;
            text-orientation: mixed;
        }
        .chat-bubble * {
            writing-mode: horizontal-tb !important;
            text-orientation: mixed !important;
            max-width: 100%;
        }
        .chat-bubble p,
        .chat-bubble ul,
        .chat-bubble ol,
        .chat-bubble blockquote,
        .chat-bubble pre,
        .chat-bubble h1,
        .chat-bubble h2,
        .chat-bubble h3,
        .chat-bubble h4,
        .chat-bubble h5,
        .chat-bubble h6 { margin: 0.35em 0; }
        .chat-bubble ul,
        .chat-bubble ol { padding-left: 1.4em; }
        .chat-bubble pre {
            white-space: pre-wrap;
            font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
        }
        .chat-bubble a {
            color: inherit;
            text-decoration: underline;
        }
        .chat-row.received .chat-bubble {
            background: white;
            border-bottom-left-radius: 6px;
            color: #1e2f3f;
        }
        .chat-row.sent .chat-bubble {
            background: #1e3a4d;
            border-bottom-right-radius: 6px;
            color: white;
        }

        .chat-time {
            font-size: 0.6rem;
            margin-top: 4px;
            padding: 0 4px;
            opacity: 0.6;
        }
        .chat-row.received .chat-time { color: #6c7e91; text-align: left; }
        .chat-row.sent .chat-time { color: rgba(255,255,255,0.7); text-align: right; }

        /* 图片消息 */
        .msg-image {
            max-width: 240px;
            max-height: 180px;
            border-radius: 10px;
            cursor: pointer;
            display: block;
            margin-bottom: 4px;
        }
        .chat-row.sent .msg-image { border: 1px solid rgba(255,255,255,0.2); }
        .chat-row.received .msg-image { border: 1px solid #e2e8f0; }

        /* 文件消息 */
        .msg-file {
            display: flex;
            align-items: center;
            gap: 8px;
            border-radius: 10px;
            padding: 8px 12px;
            text-decoration: none;
            font-size: 0.85rem;
        }
        .chat-row.received .msg-file { background: #f1f5f9; color: #1e2f3f; }
        .chat-row.sent .msg-file { background: rgba(255,255,255,0.15); color: white; }
        .msg-file:hover { filter: brightness(0.95); }
        .file-info { flex: 1; min-width: 0; }
        .file-name { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .file-size { font-size: 0.7rem; opacity: 0.7; }
        .msg-image-label {
            font-size: 0.7rem;
            opacity: 0.7;
            margin-top: 2px;
        }

        /* 发送区域 */
        .send-area {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        .send-input {
            flex: 1;
            min-width: 120px;
            padding: 10px 16px;
            border-radius: 24px;
            border: 1px solid #cbd5e1;
            font-size: 0.9rem;
            background: #f8fafc;
            outline: none;
            transition: 0.2s;
            min-height: 46px;
            max-height: 160px;
            overflow-y: auto;
            text-align: left;
            white-space: pre-wrap;
            word-break: break-word;
            overflow-wrap: anywhere;
            writing-mode: horizontal-tb;
            text-orientation: mixed;
        }
        .send-input:focus { border-color: #2c7da0; box-shadow: 0 0 0 3px rgba(44,125,160,0.15); }
        .send-input:empty::before {
            content: attr(data-placeholder);
            color: #94a3b8;
            pointer-events: none;
        }
        .send-input * {
            writing-mode: horizontal-tb !important;
            text-orientation: mixed !important;
            max-width: 100%;
        }
        .file-btn {
            background: #eef2f9;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            flex-shrink: 0;
        }
        .file-btn:hover { background: #dde4ed; }
        .send-btn {
            background: #1e3a4d;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 24px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            flex-shrink: 0;
        }
        .send-btn:hover { background: #0f2b3a; }
        .send-btn:active { transform: scale(0.97); }
        .file-indicator {
            width: 100%;
            font-size: 0.75rem;
            color: #2c7da0;
            background: #e0f2fe;
            padding: 4px 14px;
            border-radius: 20px;
            display: none;
            align-items: center;
            gap: 6px;
        }
        .file-indicator .remove-file {
            cursor: pointer;
            font-weight: bold;
            margin-left: auto;
            color: #b91c1c;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #1e2f3f;
            color: white;
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
            z-index: 999;
            box-shadow: 0 8px 24px rgba(0,0,0,0.25);
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .conn-status { margin-top: 15px; font-size: 0.75rem; display: flex; align-items: center; gap: 8px; justify-content: center; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #f97316; }
        .dot.connected { background: #10b981; box-shadow: 0 0 4px #10b981; }
        footer { margin-top: 25px; text-align: center; font-size: 0.7rem; color: #8a9bb0; border-top: 1px solid #e2e8f0; padding-top: 18px; }
        @media (max-width: 700px) {
            .card { padding: 20px; }
            .two-columns { flex-direction: column; }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs2@0.0.2/qrcode.min.js"></script>
</head>
<body>
<div class="card">
    <h1>
        📲 手机扫码传文本
        <span class="status-badge" id="wsBadge">⚡ 连接中...</span>
    </h1>
    <div class="two-columns">
        <div class="qr-box">
            <h3>📷 手机扫描二维码</h3>
            <div id="qrcode"></div>
            <div class="tip">💡 微信/浏览器扫码 → 双向传文字/图片/文件</div>
            <div class="conn-status">
                <span class="dot" id="statusDot"></span>
                <span id="wsText">WebSocket 等待连接</span>
            </div>
        </div>
        <div class="messages-box">
            <div class="messages-header">
                <h3>💬 聊天</h3>
                <button class="clear-btn" id="clearBtn">清空记录</button>
            </div>
            <div class="chat-list" id="messagesList">
                <div class="empty-msg">✨ 等待手机发送...</div>
            </div>
            <!-- 发送区域 -->
            <div class="send-area" id="sendArea">
                <div class="send-input" id="sendInput" contenteditable="true" data-placeholder="输入回复内容，支持粘贴带格式文本..."></div>
                <input type="file" id="fileInput" hidden accept="*/*" />
                <button class="file-btn" id="fileBtn" title="选择文件">📎</button>
                <button class="send-btn" id="sendBtn">发送</button>
                <div class="file-indicator" id="fileIndicator">
                    📄 <span id="fileName"></span>
                    <span class="remove-file" id="removeFile">✕</span>
                </div>
            </div>
        </div>
    </div>
    <footer>🔄 支持双向传输 | 收到文本自动复制到剪贴板 | 需同一 Wi-Fi</footer>
</div>

<div class="toast" id="toast"></div>

<script>
    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsUrl = `${protocol}//${window.location.host}`;
    const mobileUrl = `${window.location.protocol}//${window.location.host}/mobile`;

    new QRCode(document.getElementById("qrcode"), {
        text: mobileUrl,
        width: 200,
        height: 200,
        colorDark: "#1e2f3f",
        colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.M
    });

    let socket = null;
    let messageHistory = [];
    let reconnectAttempts = 0;
    let selectedFile = null;
    let maxFileSize = 100 * 1024 * 1024; // 默认 100MB，连接后由服务端更新

    const messagesList = document.getElementById('messagesList');
    const clearBtn = document.getElementById('clearBtn');
    const wsBadge = document.getElementById('wsBadge');
    const wsText = document.getElementById('wsText');
    const statusDot = document.getElementById('statusDot');
    const sendInput = document.getElementById('sendInput');
    const sendBtn = document.getElementById('sendBtn');
    const fileInput = document.getElementById('fileInput');
    const fileBtn = document.getElementById('fileBtn');
    const fileIndicator = document.getElementById('fileIndicator');
    const fileNameEl = document.getElementById('fileName');
    const removeFile = document.getElementById('removeFile');
    const toast = document.getElementById('toast');

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' })[m] || m);
    }

    function escapeAttribute(str) {
        return escapeHtml(str).replace(/"/g, '&quot;');
    }

    function normalizeEditorHtml(html) {
        return (html || '')
            .replace(/<div><br><\/div>/gi, '<br>')
            .replace(/<div>/gi, '<p>')
            .replace(/<\/div>/gi, '</p>')
            .replace(/&nbsp;/gi, ' ')
            .trim();
    }

    function sanitizeRichHtml(rawHtml) {
        if (!rawHtml) return '';
        const parser = new DOMParser();
        const doc = parser.parseFromString(`<div>${normalizeEditorHtml(rawHtml)}</div>`, 'text/html');
        const allowedTags = new Set(['A', 'B', 'BLOCKQUOTE', 'BR', 'CODE', 'EM', 'I', 'LI', 'OL', 'P', 'PRE', 'S', 'STRONG', 'U', 'UL']);

        const walk = (node) => {
            if (node.nodeType === Node.TEXT_NODE) return escapeHtml(node.textContent || '');
            if (node.nodeType !== Node.ELEMENT_NODE) return '';

            const tag = node.tagName.toUpperCase();
            const childrenHtml = Array.from(node.childNodes).map(walk).join('');
            if (!allowedTags.has(tag)) return childrenHtml;

            let attrs = '';
            if (tag === 'A') {
                const href = node.getAttribute('href') || '';
                if (/^(https?:|mailto:|tel:)/i.test(href)) {
                    attrs += ` href="${escapeAttribute(href)}" target="_blank" rel="noopener noreferrer"`;
                }
            }
            return `<${tag.toLowerCase()}${attrs}>${childrenHtml}</${tag.toLowerCase()}>`;
        };

        return Array.from(doc.body.firstChild.childNodes).map(walk).join('').trim();
    }

    function normalizeRichStructure(html) {
        if (!html) return '';
        const doc = new DOMParser().parseFromString(`<div>${html}</div>`, 'text/html');
        const root = doc.body.firstChild;

        const cleanNode = (node) => {
            if (node.nodeType === Node.TEXT_NODE) {
                return doc.createTextNode(node.textContent || '');
            }
            if (node.nodeType !== Node.ELEMENT_NODE) return null;

            const tag = node.tagName.toUpperCase();
            const childNodes = Array.from(node.childNodes).map(cleanNode).filter(Boolean);
            const hasMeaningfulText = childNodes.some(child => {
                return child.nodeType === Node.TEXT_NODE
                    ? (child.textContent || '').trim()
                    : true;
            });

            if (tag === 'BR') return doc.createElement('br');

            if (tag === 'P' || tag === 'BLOCKQUOTE' || tag === 'PRE') {
                if (!hasMeaningfulText) return null;
                const el = doc.createElement(tag.toLowerCase());
                childNodes.forEach(child => el.appendChild(child));
                return el;
            }

            if (tag === 'UL' || tag === 'OL') {
                const el = doc.createElement(tag.toLowerCase());
                childNodes
                    .filter(child => child.nodeType === Node.ELEMENT_NODE && child.tagName.toUpperCase() === 'LI')
                    .forEach(child => el.appendChild(child));
                return el.childNodes.length ? el : null;
            }

            if (tag === 'LI') {
                if (!hasMeaningfulText) return null;
                const el = doc.createElement('li');
                childNodes.forEach(child => el.appendChild(child));
                return el;
            }

            if (tag === 'A' || tag === 'B' || tag === 'STRONG' || tag === 'I' || tag === 'EM' || tag === 'U' || tag === 'S' || tag === 'CODE') {
                if (!hasMeaningfulText) return null;
                const el = doc.createElement(tag.toLowerCase());
                if (tag === 'A') {
                    const href = node.getAttribute('href');
                    if (href) el.setAttribute('href', href);
                    el.setAttribute('target', '_blank');
                    el.setAttribute('rel', 'noopener noreferrer');
                }
                childNodes.forEach(child => el.appendChild(child));
                return el;
            }

            const fragment = doc.createDocumentFragment();
            childNodes.forEach(child => fragment.appendChild(child));
            return fragment;
        };

        const wrapper = doc.createElement('div');
        Array.from(root.childNodes)
            .map(cleanNode)
            .filter(Boolean)
            .forEach(child => wrapper.appendChild(child));

        return wrapper.innerHTML
            .replace(/(<br>\s*){3,}/gi, '<br><br>')
            .replace(/(<p>\s*<\/p>)/gi, '')
            .trim();
    }

    function htmlToPlainText(html) {
        if (!html) return '';
        const doc = new DOMParser().parseFromString(`<div>${html}</div>`, 'text/html');
        return (doc.body.innerText || doc.body.textContent || '').replace(/\n{3,}/g, '\n\n').trim();
    }

    function plainTextToHtml(text) {
        return escapeHtml(text || '').replace(/\n/g, '<br>');
    }

    function normalizePlainText(text) {
        return (text || '')
            .replace(/\r\n/g, '\n')
            .replace(/\r/g, '\n')
            .replace(/\u00a0/g, ' ')
            .replace(/\n{3,}/g, '\n\n');
    }

    function richHtmlToEditorHtml(html) {
        return normalizeRichStructure(sanitizeRichHtml(html));
    }

    function getEditorPayload(editor) {
        const html = normalizeRichStructure(sanitizeRichHtml(editor.innerHTML));
        const content = htmlToPlainText(html);
        return { content, html };
    }

    function setEditorContent(editor, html) {
        editor.innerHTML = html || '';
    }

    function insertHtmlAtCursor(html) {
        const selection = window.getSelection();
        if (!selection || !selection.rangeCount) {
            sendInput.innerHTML += html;
            return;
        }

        const range = selection.getRangeAt(0);
        range.deleteContents();

        const temp = document.createElement('div');
        temp.innerHTML = html;
        const fragment = document.createDocumentFragment();
        let node;
        let lastNode = null;

        while ((node = temp.firstChild)) {
            lastNode = fragment.appendChild(node);
        }

        range.insertNode(fragment);
        if (lastNode) {
            range.setStartAfter(lastNode);
            range.collapse(true);
            selection.removeAllRanges();
            selection.addRange(range);
        }
    }

    async function writeToClipboard(content, html) {
        try {
            if (html && navigator.clipboard && window.ClipboardItem && navigator.clipboard.write) {
                const item = new ClipboardItem({
                    'text/plain': new Blob([content], { type: 'text/plain' }),
                    'text/html': new Blob([html], { type: 'text/html' })
                });
                await navigator.clipboard.write([item]);
                return true;
            }
            if (content && navigator.clipboard && navigator.clipboard.writeText) {
                await navigator.clipboard.writeText(content);
                return true;
            }
        } catch (e) {}
        return false;
    }

    function formatSize(bytes) {
        if (!bytes) return '';
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
        return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
    }

    function showToast(msg) {
        toast.textContent = msg;
        toast.classList.add('show');
        clearTimeout(toast._timeout);
        toast._timeout = setTimeout(() => toast.classList.remove('show'), 2000);
    }

    function renderMessages() {
        if (!messagesList) return;
        if (messageHistory.length === 0) {
            messagesList.innerHTML = '<div class="empty-msg">📭 暂无消息，手机扫码发送一条吧~</div>';
            return;
        }
        messagesList.innerHTML = messageHistory.map(msg => {
            const side = msg.from === 'computer' ? 'sent' : 'received';
            const sender = msg.from === 'computer' ? '电脑' : '手机';
            const timeHtml = `<div class="chat-time">${msg.time}</div>`;

            if (msg.type === 'text') {
                return `<div class="chat-row ${side}">
                    <div class="chat-sender">${sender}</div>
                    <div class="chat-bubble">${msg.html || plainTextToHtml(msg.text)}</div>
                    ${timeHtml}
                </div>`;
            }
            if (msg.type === 'image') {
                return `<div class="chat-row ${side}">
                    <div class="chat-sender">${sender}</div>
                    <div class="chat-bubble">
                        <img class="msg-image" src="${msg.content}" alt="${escapeHtml(msg.filename)}" onclick="window.open(this.src)" title="点击查看原图" />
                        <div class="msg-image-label">${escapeHtml(msg.filename)}</div>
                    </div>
                    ${timeHtml}
                </div>`;
            }
            if (msg.type === 'file') {
                return `<div class="chat-row ${side}">
                    <div class="chat-sender">${sender}</div>
                    <div class="chat-bubble">
                        <a class="msg-file" href="${msg.content}" download="${escapeHtml(msg.filename)}">
                            <span>📄</span>
                            <div class="file-info">
                                <div class="file-name">${escapeHtml(msg.filename)}</div>
                                <div class="file-size">${formatSize(msg.size)}</div>
                            </div>
                            <span>⬇️</span>
                        </a>
                    </div>
                    ${timeHtml}
                </div>`;
            }
            return '';
        }).join('');
        messagesList.scrollTop = messagesList.scrollHeight;
    }

    let _lastMsgKey = '';
    function addMessage(data, from) {
        // 去重：相同来源+相同内容 1 秒内不重复添加
        const msgKey = `${from || 'mobile'}|${data.type}|${data.content || data.text || ''}`;
        if (msgKey === _lastMsgKey) return;
        _lastMsgKey = msgKey;
        setTimeout(() => { if (_lastMsgKey === msgKey) _lastMsgKey = ''; }, 1000);

        const now = new Date();
        const timeStr = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
        const entry = { from: from || 'mobile', time: timeStr };
        if (data.type === 'text') {
            entry.type = 'text'; entry.text = data.content; entry.html = data.html ? sanitizeRichHtml(data.html) : '';
        } else if (data.type === 'image') {
            entry.type = 'image'; entry.content = data.content; entry.filename = data.filename;
        } else if (data.type === 'file') {
            entry.type = 'file'; entry.content = data.content; entry.filename = data.filename; entry.mimeType = data.mimeType; entry.size = data.size;
        }
        messageHistory.push(entry);
        if (messageHistory.length > 100) messageHistory.shift();
        renderMessages();
    }

    function clearMessages() {
        messageHistory = [];
        renderMessages();
    }

    function updateConnectionStatus(connected) {
        if (connected) {
            wsBadge.innerHTML = "✅ 已连接";
            wsText.innerText = "WebSocket 已连接，实时收发";
            statusDot.className = "dot connected";
        } else {
            wsBadge.innerHTML = "⚠️ 未连接";
            wsText.innerText = "连接断开，重连中...";
            statusDot.className = "dot";
        }
    }

    function connectWebSocket() {
        if (socket && socket.readyState === WebSocket.OPEN) return;
        try {
            socket = new WebSocket(wsUrl);
            socket.onopen = () => {
                console.log("WebSocket 连接成功");
                reconnectAttempts = 0;
                updateConnectionStatus(true);
            };
            socket.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (data.type === 'text' && data.content) {
                        addMessage(data, 'mobile');
                        writeToClipboard(data.content, data.html).then(() => {
                            showToast('✅ 文本已复制到剪贴板');
                        }).catch(() => {});
                    } else if (data.type === 'image' && data.content) {
                        addMessage(data, 'mobile');
                    } else if (data.type === 'file' && data.content) {
                        addMessage(data, 'mobile');
                    } else if (data.type === 'system') {
                        if (data.maxFileSizeMB) {
                            maxFileSize = data.maxFileSizeMB * 1024 * 1024;
                        }
                        console.log("系统消息:", data.content);
                    } else if (data.type === 'ack') {
                        // 发送成功，不额外弹 toast（消息已显示在聊天中）
                    }
                } catch (err) {
                    // 非 JSON 消息忽略，不做回退显示
                    console.warn('收到无法解析的消息');
                }
            };
            socket.onerror = () => updateConnectionStatus(false);
            socket.onclose = () => {
                updateConnectionStatus(false);
                setTimeout(() => {
                    if (reconnectAttempts < 10) {
                        reconnectAttempts++;
                        connectWebSocket();
                    }
                }, 2000);
            };
        } catch(err) {
            console.error("连接异常", err);
            setTimeout(() => connectWebSocket(), 2000);
        }
    }

    // 文件选择
    fileBtn.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', () => {
        const file = fileInput.files[0];
        if (!file) return;
        if (file.size > maxFileSize) {
            showToast(`⚠️ 文件过大（最大 ${Math.round(maxFileSize / 1024 / 1024)}MB）`);
            fileInput.value = '';
            return;
        }
        selectedFile = file;
        fileNameEl.textContent = file.name + ' (' + formatSize(file.size) + ')';
        fileIndicator.style.display = 'flex';
    });

    removeFile.addEventListener('click', () => {
        selectedFile = null;
        fileInput.value = '';
        fileIndicator.style.display = 'none';
    });

    function readFileAsBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.onerror = reject;
            reader.readAsDataURL(file);
        });
    }

    async function doSend() {
        const { content: text, html } = getEditorPayload(sendInput);
        if (!text && !selectedFile) return;

        if (!socket || socket.readyState !== WebSocket.OPEN) {
            showToast('⚠️ 尚未连接，请稍后重试');
            return;
        }

        // 发送文本
        if (text) {
            socket.send(JSON.stringify({ type: 'text', content: text, html: html || undefined }));
            addMessage({ type: 'text', content: text, html: html || undefined }, 'computer');
            setEditorContent(sendInput, '');
        }

        // 发送文件
        if (selectedFile) {
            try {
                const dataUrl = await readFileAsBase64(selectedFile);
                const isImage = selectedFile.type.startsWith('image/');
                const msgType = isImage ? 'image' : 'file';
                socket.send(JSON.stringify({
                    type: msgType,
                    content: dataUrl,
                    filename: selectedFile.name,
                    mimeType: selectedFile.type,
                    size: selectedFile.size
                }));
                addMessage({
                    type: msgType,
                    content: dataUrl,
                    filename: selectedFile.name,
                    mimeType: selectedFile.type,
                    size: selectedFile.size
                }, 'computer');
            } catch (err) {
                showToast('⚠️ 读取文件失败');
            }
            selectedFile = null;
            fileInput.value = '';
            fileIndicator.style.display = 'none';
        }
    }

    sendBtn.addEventListener('click', doSend);
    sendInput.addEventListener('paste', (e) => {
        e.preventDefault();
        const clipboard = e.clipboardData || window.clipboardData;
        if (!clipboard) return;

        const html = clipboard.getData('text/html');
        const text = clipboard.getData('text/plain');

        if (html) {
            insertHtmlAtCursor(richHtmlToEditorHtml(html));
            return;
        }

        if (text) {
            insertHtmlAtCursor(plainTextToHtml(normalizePlainText(text)));
        }
    });
    sendInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            doSend();
        }
    });
    clearBtn.addEventListener('click', clearMessages);
    connectWebSocket();
</script>
</body>
</html>
